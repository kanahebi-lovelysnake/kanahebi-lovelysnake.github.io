<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖光祭カードゲーム同好会受付番号サイト</title>
    <script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" defer></script>
    <script type="module" src="./user.js"></script>
    <link rel="stylesheet" href="user.css">
</head>
<body>
    <input type="number" id="input">
    <p>こちらに受付番号を入力して通知を許可すると順番が近づいたら通知を受け取れます。</p>
    <span>※iPhoneは非対応</span>
    <div class="container">
        <div class="left">
            <p>呼び出し中</p>
            <div class="container" id="leftcontainer"></div>
        </div>
        <div class="right">
            <p>待機中</p>
            <div class="container" id="rightcontainer"></div>
        </div>
    </div>
    <p>お知らせ</p>
    <div id="message"></div>
</body>
</html>
